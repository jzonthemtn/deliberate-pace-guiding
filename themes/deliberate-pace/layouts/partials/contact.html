<section id="contact" class="contact">
  <div class="container">
    <div class="contact-layout">

      <div class="contact-text fade-in">
        <h2>Start a Conversation</h2>
        <p>Every trip begins with a conversation. Tell me what you&rsquo;re looking for &mdash; or what you&rsquo;re looking to leave behind &mdash; and we&rsquo;ll find the right trail together.</p>
        <div class="contact-detail">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13 2 4"/>
          </svg>
          <a href="mailto:{{ .Site.Params.email }}" class="contact-email-link">{{ .Site.Params.email }}</a>
        </div>
        <div class="contact-detail">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          {{ .Site.Params.location }}
        </div>
      </div>

      <form class="fade-in" action="https://formspree.io/f/mgoqlowg" method="POST">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required aria-required="true">
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required aria-required="true">
        </div>
        <div>
          <label for="region">Region of Interest</label>
          <select id="region" name="region">
            <option value="appalachia">Appalachia</option>
            <option value="alaska">Southeast Alaska</option>
            <option value="cruise">Cruise Ship Excursion (Juneau)</option>
            <option value="other">Other — specify in message below</option>
          </select>
        </div>
        <div>
          <label for="message">Tell Me About Your Ideal Trip</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>

    </div>
  </div>
</section>
