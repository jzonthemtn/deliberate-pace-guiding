<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  {{- $desc := .Site.Params.description }}
  {{- with .Params.description }}{{ $desc = . }}{{ end }}
  <meta name="description" content="{{ $desc }}">
  <meta name="keywords" content="{{ .Site.Params.keywords }}">
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ $desc }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}img/logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
  <meta name="twitter:description" content="{{ $desc }}">
  <link rel="canonical" href="{{ .Permalink }}">
  {{ partial "structured-data.html" . }}
  <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  <link rel="manifest" href="{{ "site.webmanifest" | relURL }}">
  <meta name="theme-color" content="#2D4A3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-X4X5EKQQST"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-X4X5EKQQST');
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <button class="lightbox-close" type="button" aria-label="Close image viewer">&times;</button>
    <img class="lightbox-img" src="" alt="">
    <div class="lightbox-caption"></div>
  </div>
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
